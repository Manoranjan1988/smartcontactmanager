<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">

<head>
    <meta charset="utf-8">
    <!-- Viewport fix for mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Animate CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.13.1/font/bootstrap-icons.css">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />

    <title th:text="${title}">Default Title</title>


</head>

<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top custom-navbar shadow-sm py-2">
        <div class="container">
            <!-- Brand with Gap: 'me-lg-5' for desktop gap -->
            <a class="navbar-brand d-flex align-items-center me-lg-5" th:href="@{/}">
                <img th:src="@{/image/brand-logo.jpg}" alt="Logo" class="rounded-circle me-3"
                    style="width:40px;height:40px;object-fit:cover;">
                <span class="fw-bold fs-4">SCM</span>
            </a>

            <!-- Hamburger (Note the 'data-bs' prefix) -->
            <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse"
                data-bs-target="#navContent">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Centered UL: Using 'mx-auto' for absolute center -->
            <div class="collapse navbar-collapse" id="navContent">
                <ul class="navbar-nav ms-auto text-uppercase text-center gap-lg-4">
                    <li class="nav-item"><a class="nav-link" th:href="@{/}">Home</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/public/about}">About</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/public/signup}">Signup</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/public/login}">Login</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main layout:fragment="content" class="container-fluid px-0" style="min-height: 85vh;">
        <!-- Pages will be injected here -->
    </main>

    <!-- Footer: Fully Responsive Grid -->
    <footer th:fragment="footer_section" class="footer py-4 mt-5 bg-dark text-white">
        <div class="container">
            <div class="row gy-4 align-items-center">

                <!-- Brand Info -->
                <div class="col-12 col-md-4 text-center text-md-start">
                    <span class="fw-bold fs-5">Smart Contact Manager</span>
                </div>

                <!-- Footer Links -->
                <div class="col-12 col-md-4 text-center">
                    <div class="d-flex flex-wrap justify-content-center gap-3 footer-links">
                        <a th:href="@{/}" class="text-white text-decoration-none small">Home</a>
                        <a th:href="@{/public/about}" class="text-white text-decoration-none small">About</a>
                        <a th:href="@{/public/signup}" class="text-white text-decoration-none small">Signup</a>
                        <a th:href="@{/public/terms}" class="text-white text-decoration-none small">Terms</a>
                    </div>
                </div>

                <!-- Social Icons -->
                <div class="col-12 col-md-4 text-center text-md-end footer-social-icons">
                    <a href="#" class="text-white mx-2 fs-5"><i class="fab fa-facebook"></i></a>
                    <a href="#" class="text-white mx-2 fs-5"><i class="fab fa-twitter"></i></a>
                    <a href="#" class="text-white mx-2 fs-5"><i class="fab fa-linkedin"></i></a>
                    <a href="#" class="text-white mx-2 fs-5"><i class="fab fa-github"></i></a>
                </div>
            </div>

            <hr class="my-4 bg-secondary">

            <div class="row">
                <div class="col-12 text-center mt-2">
                    <p class="text-secondary small mb-0">
                        &copy; 2026 Smart Contact Manager. Created with <i class="fas fa-heart text-danger"></i> for
                        better connectivity.
                    </p>
                    <p class="text-secondary my-name small mb-0">
                        Design By Manoranjan
                    </p>
                </div>
            </div>
        </div>
    </footer>

    <!-- Scripts -->
    <script th:src="@{/js/jquery.js}"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.23.0/sweetalert2.min.js"></script>
    <script th:src="@{/js/script.js}"></script>
</body>

</html>
