<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz" layout:decorate="~{base}">

<head>
    <title th:text="${title}">About & Contact - SCM</title>
</head>

<body>
    <div layout:fragment="content">

        <!-- Section 1: About Our Brand -->
        <section class="about-section py-5 bg-white">
            <div class="container">
                <div class="row align-items-center gy-5">
                    <div class="col-lg-6 animate__animated animate__fadeInLeft">
                        <h6 class="text-primary fw-bold text-uppercase letter-spacing-1">Who We Are</h6>
                        <h1 class="display-5 fw-bold mb-4">We help you stay connected with your world.</h1>
                        <p class="lead text-muted mb-4">
                            Smart Contact Manager is more than just a tool. It's your personal assistant
                            designed to organize, secure, and simplify your professional and personal life.
                        </p>
                        <div class="row g-4 mb-4">
                            <div class="col-sm-6">
                                <div class="d-flex align-items-center">
                                    <i class="fas fa-check-circle text-success fs-4 me-2"></i>
                                    <span class="fw-bold">Secure Cloud Sync</span>
                                </div>
                            </div>
                            <div class="col-sm-6">
                                <div class="d-flex align-items-center">
                                    <i class="fas fa-check-circle text-success fs-4 me-2"></i>
                                    <span class="fw-bold">Smart Search & Filter</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-lg-6 text-center animate__animated animate__fadeInRight">
                        <img th:src="@{/image/about-us.jpg}" alt="About Us" class="img-fluid rounded-4 shadow-lg"
                            style="max-height: 400px;">
                    </div>
                </div>
            </div>
        </section>

    </div>
</body>

</html>
