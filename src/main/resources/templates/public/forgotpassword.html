<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{base}">

<head>
    <title th:text="${title}">Reset Password - SCM</title>
</head>

<body>
    <div layout:fragment="content">
        <!-- Vertical Center alignment for all devices -->
        <section class="reset-section d-flex align-items-center justify-content-center py-5 px-2" style="min-height: 90vh;">
            
            <div class="container">
                <div class="row justify-content-center">
                    <!-- Compact Grid: Desktop pe chota aur sleek -->
                    <div class="col-12 col-md-8 col-lg-5 col-xl-4">
                        
                        <div class="card reset-card shadow-lg border-0 overflow-hidden animate__animated animate__fadeIn" style="border-radius: 20px;">
                            <div class="card-body p-0">

                                <!-- Header Section -->
                                <div class="text-center py-4 bg-white border-bottom">
                                    <h3 class="fw-bold mb-1 text-primary">Reset Password</h3>
                                    </p>
                                </div>

                                <!-- Step-wise Alerts -->
                                <div th:if="${msg}" class="px-4 pt-3">
                                    <div class="alert alert-info py-2 px-3 mb-0 shadow-sm border-0 text-center small animate__animated animate__bounceIn" 
                                         style="border-radius: 12px;" role="alert">
                                        <i class="fas fa-info-circle me-2"></i>
                                        <span th:text="${msg}" class="fw-bold"></span>
                                    </div>
                                </div>

                                <!-- Form Content -->
                                <div class="p-4 pt-3">
                                    <form th:action="${otpSent} ? @{/public/do_password} : @{/public/send_otp}" method="post">

                                        <!-- Email Input (Always Visible) -->
                                        <div class="mb-3">
                                            <div class="input-group shadow-sm" style="border-radius: 10px; overflow: hidden;">
                                                <span class="input-group-text bg-light border-0 text-muted px-1"><i class="fas fa-envelope text-success"></i></span>
                                                <input id="email" type="email" name="email" th:value="${email}" th:readonly="${otpSent}"
                                                       class="form-control bg-light border-0 py-2" 
                                                       th:classappend="${otpSent} ? 'text-muted fw-bold' : ''"
                                                       placeholder="Email Address" required>
                                            </div>
                                        </div>

                                        <!-- Step 2 Fields: Hidden until OTP is sent -->
                                        <div th:if="${otpSent}" class="animate__animated animate__fadeInUp">
                                            
                                            <!-- New Password -->
                                            <div class="mb-3">
                                                <div class="input-group shadow-sm" style="border-radius: 10px; overflow: hidden;">
                                                    <span class="input-group-text bg-light border-0 text-muted px-1"><i class="fas fa-lock text-info"></i></span>
                                                    <input type="password" name="password" id="password"
                                                           class="form-control bg-light border-0 py-2" placeholder="New Password" required>
                                                </div>
                                            </div>

                                            <!-- Confirm Password -->
                                            <div class="mb-3">
                                                <div class="input-group shadow-sm" style="border-radius: 10px; overflow: hidden;">
                                                    <span class="input-group-text bg-light border-0 text-muted px-1"><i class="fas fa-check-double text-info"></i></span>
                                                    <input type="password" name="cnfpassword" id="cnfpassword"
                                                           class="form-control bg-light border-0 py-2" placeholder="Confirm Password" required>
                                                </div>
                                            </div>

                                            <!-- OTP Input -->
                                            <div class="mb-3">
                                                <div class="input-group shadow-sm" style="border-radius: 10px; overflow: hidden;">
                                                    <span class="input-group-text bg-light border-0 text-muted px-1"><i class="fa-solid fa-key text-danger"></i></span>
                                                    <input type="text" name="otp" pattern="[0-9]{6}" maxlength="6" inputmode="numeric" id="otp"
                                                           class="form-control bg-light border-0 py-2" placeholder="6-Digit OTP" required>
                                                </div>
                                            </div>

                                            <!-- Live Timer Badge -->
                                            <div class="text-center mb-3">
                                                <span class="badge rounded-pill bg-warning text-dark py-2 px-3 shadow-sm border border-white">
                                                    <i class="fas fa-clock me-1"></i> Expires in: <span id="timer" class="fw-bold">00:40</span>
                                                </span>
                                            </div>
                                        </div>

                                        <!-- Action Button (Primary) -->
                                        <div class="text-center mt-4">
                                            <button type="submit" class="btn btn-premium w-100 py-2 rounded-pill shadow fw-bold text-uppercase letter-spacing-1" id="submit-btn">
                                                <span th:text="${otpSent} ? 'Update Password' : 'Send OTP Code'"></span>
                                            </button>
                                        </div>

                                        <!-- Change Email Link -->
                                        <div th:if="${otpSent}" class="text-center mt-3">
                                            <a th:href="@{/public/forgotpassword}" class="small text-primary text-decoration-none fw-bold border-bottom border-primary">
                                                <i class="fas fa-arrow-left me-1"></i> Change Email?
                                            </a>
                                        </div>
                                    </form>

                                    <!-- Resend Section: Appears only after Timer hits Zero via JS -->
                                    <div th:if="${otpSent}" id="resend-container" style="display: none;"
                                        class="text-center mt-4 p-3 bg-light rounded-4 animate__animated animate__fadeIn">
                                        <p class="text-muted small mb-2">Didn't get the code?</p>
                                        <form th:action="@{/public/send_otp}" method="post">
                                            <input type="hidden" name="email" th:value="${email}">
                                            <button type="submit" class="btn btn-outline-primary btn-sm rounded-pill px-4 fw-bold shadow-sm">
                                                <i class="fas fa-redo-alt me-1"></i> Resend OTP
                                            </button>
                                        </form>
                                    </div>

                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>
</body>
</html>
