<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz" layout:decorate="~{base}">

<head>
    <title th:text="${title}">Contact us - SCM</title>
</head>

<body>
    <div layout:fragment="content">

        <!-- CONTACT SECTION -->
<section class="contact-section py-5 bg-light border-top">
    <div class="container">

        <!-- 🔥 TOP CARDS -->
        <div class="row text-center mb-5" data-aos="fade-up" data-aos-delay="100">
            <div class="col-md-4 mb-3">
                <div class="card shadow-sm border-0 p-4 rounded-4 h-100">
                    <i class="fas fa-headset fs-2 text-primary mb-3"></i>
                    <h6 class="fw-bold">24x7 Support</h6>
                    <p class="small text-muted">We are always here to help you</p>
                </div>
            </div>

            <div class="col-md-4 mb-3" data-aos="fade-up" data-aos-delay="200">
                <div class="card shadow-sm border-0 p-4 rounded-4 h-100">
                    <i class="fas fa-shield-alt fs-2 text-success mb-3"></i>
                    <h6 class="fw-bold">Secure Data</h6>
                    <p class="small text-muted">Your data is safe & encrypted</p>
                </div>
            </div>

            <div class="col-md-4 mb-3" data-aos="fade-up" data-aos-delay="300">
                <div class="card shadow-sm border-0 p-4 rounded-4 h-100">
                    <i class="fas fa-bolt fs-2 text-warning mb-3"></i>
                    <h6 class="fw-bold">Fast Response</h6>
                    <p class="small text-muted">We respond within 24 hours</p>
                </div>
            </div>
        </div>

        <!-- 🔥 TITLE -->
        <div class="row justify-content-center text-center mb-5">
            <div class="col-lg-7" data-aos="zoom-in">
                <h2 class="fw-bold">Contact With Us</h2>
                <p class="text-muted small">
                    Have questions? Shoot us a message and we'll get back to you within 24 hours.
                </p>
            </div>
        </div>

        <!-- 🔥 MAIN CARD -->
        <div class="row justify-content-center">
            <div class="col-lg-10 col-xl-8" data-aos="fade-up" data-aos-delay="200">
                <div class="card border-0 shadow-lg overflow-hidden" style="border-radius: 20px;">
                    <div class="row g-0">

                        <!-- LEFT SIDE (IMAGE + INFO) -->
                        <div class="col-md-5 position-relative text-white d-flex flex-column justify-content-between p-0" data-aos="fade-right"
                             style="border-radius: 20px 0 0 20px; overflow:hidden;">

                            <img th:src="@{/image/contact-bg.jpg}"
                                 class="w-100 h-100 position-absolute"
                                 style="object-fit: cover; opacity:0.6;">

                            <div class="position-absolute w-100 h-100"
                                 style="background: linear-gradient(135deg,#0f172a,#1e293b); opacity:0.9;"></div>

                            <div class="p-5 position-relative">
                                <h4 class="fw-bold mb-4 text-info">Contact Info</h4>

                                <div class="d-flex mb-4">
                                    <i class="fas fa-map-marker-alt mt-1 me-3 text-info"></i>
                                    <p class="mb-0 small">Bhubaneswar, Pin-751002</p>
                                </div>

                                <div class="d-flex mb-4">
                                    <i class="fas fa-envelope mt-1 me-3 text-info"></i>
                                    <p class="mb-0 small text-break">manoranjan1988.sahoo@gmail.com</p>
                                </div>

                                
                            </div>

                            <div class="text-center pb-4 position-relative footer-social-icons">
                                <a href="#" class="text-white mx-2 fs-5"><i class="fab fa-facebook"></i></a>
                                <a href="#" class="text-white mx-2 fs-5"><i class="fab fa-twitter"></i></a>
                                <a href="#" class="text-white mx-2 fs-5"><i class="fab fa-linkedin"></i></a>
                                <a href="#" class="text-white mx-2 fs-5"><i class="fab fa-github"></i></a>
                            </div>
                        </div>

                        <!-- RIGHT SIDE (FORM) -->
                        <div class="col-md-7 p-5 bg-white" data-aos="fade-left"
                            data-aos-delay="200" style="border-radius: 0 20px 20px 0;">

                            <form th:action="@{/public/contact_process}" method="post">

                                <div class="mb-3">
                                    <label class="form-label small fw-bold">Full Name</label>
                                    <input type="text" name="name"
                                           class="form-control contact-input"
                                           placeholder="Enter your name" required>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label small fw-bold">Email Address</label>
                                    <input type="email" name="email"
                                           class="form-control contact-input"
                                           placeholder="name@example.com" required>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label small fw-bold">Subject</label>
                                    <input type="text" name="subject"
                                           class="form-control contact-input"
                                           placeholder="How can we help?" required>
                                </div>

                                <div class="mb-4">
                                    <label class="form-label small fw-bold">Message</label>
                                    <textarea name="message"
                                              class="form-control contact-input"
                                              rows="4"
                                              placeholder="Your message here..." required></textarea>
                                </div>

                                <button type="submit" id="sendEmailBtn"
                                        class="btn btn-primary w-100 py-2 rounded-pill shadow fw-bold animate__animated animate__pulse animate__delay-1s">
                                    Send Message <i class="fas fa-paper-plane ms-2"></i>
                                </button>

                            </form>

                            <!-- MESSAGE BOX (unchanged) -->
                            <div th:if="${msgTitle}">
                                <input type="hidden" id="msg-box" th:value="${msgDash}" />
                                <input type="hidden" id="type-box" th:value="${msgType}" />
                                <input type="hidden" id="title-box" th:value="${msgTitle}" />
                            </div>

                        </div>

                    </div>
                </div>
            </div>
        </div>

    </div>
</section>

    </div>
</body>

</html>
