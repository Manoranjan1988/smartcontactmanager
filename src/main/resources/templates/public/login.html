<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{base}">

<head>
    <title th:text="${title}">Login - SCM</title>
</head>

<body>
    <div layout:fragment="content">
        <!-- Flexbox container for perfect centering -->
        <section class="login-section d-flex align-items-center justify-content-center py-5 px-2"
            style="min-height: 90vh;">

            <div class="container">
                <div class="row justify-content-center">
                    <!-- Responsive Grid: Mobile 12, Laptop 4 -->
                    <div class="col-12 col-md-8 col-lg-5 col-xl-4">

                        <div class="card login-card shadow-lg border-0 overflow-hidden animate__animated animate__fadeInUp"
                            style="border-radius: 20px;">
                            <div class="card-body p-0">

                                <!-- Header with Brand Focus -->
                                <div class="text-center py-4 bg-white border-bottom shadow-sm">
                                    <h3 class="fw-bold mb-1 text-primary">Welcome Back</h3>
                                    <p class="text-muted small mb-0 px-3">Secure access to your smart contacts</p>
                                </div>


                                <!-- Dynamic Alert Messages (Success/Error) -->
                                <div th:if="${msg != null && !(msg == 'Account inactive. Verify your email.' && attemptsLeft != null && attemptsLeft <= 0)}" 
                                class="px-4 pt-3">
                                
                                <div th:classappend="${type}"
                                    class="alert py-2 px-3 mb-0 shadow-sm border-0 text-center small animate__animated animate__shakeX"
                                    style="border-radius: 12px;" role="alert">
                                    <i class="fas fa-info-circle me-2"></i>
                                    <span th:text="${msg}" class="fw-bold"></span>
                                </div>
                            </div>


                                <div th:if="${showResend}" class="d-flex justify-content-center">
                                    <div class="resend-container text-center">
                                        <!-- text-center yahan sab center karega -->

                                        <!-- Resend Form -->
                                        <form th:action="@{/public/resend-verification}" method="post" id="resendForm"
                                            class="mb-3">
                                            <p th:if="${attemptsLeft != null && attemptsLeft > 0}"
                                                class="text-muted small">
                                                Attempts left: <span th:text="${attemptsLeft}"></span>
                                            </p>

                                            <p th:if="${attemptsLeft != null && attemptsLeft <= 0}"
                                                class="text-danger small fw-bold">
                                                No attempts left. Please try again after 3 hours.
                                            </p>

                                            <input type="hidden" name="email" th:value="${email}" />

                                            <!-- Button block class se full width ya center ho jayega -->
                                            <button type="submit" class="resend-btn btn btn-primary w-100"
                                                id="resendBtn"
                                                th:disabled="${attemptsLeft != null && attemptsLeft <= 0}">
                                                Resend Verification Email
                                            </button>
                                        </form>

                                        <!-- Back Button -->
                                        <div class="mt-3">
                                            <a href="/public/login" class="back-btn text-decoration-none">Back to
                                                Login</a>
                                        </div>

                                    </div>
                                </div>


                                <!-- Form Content -->

                                <div th:unless="${showResend}">
                                    <div class="p-4 pt-3">
                                        <form th:action="@{/public/dologin}" method="post">

                                            <!-- Email Field -->
                                            <div class="mb-3">
                                                <div class="input-group shadow-sm"
                                                    style="border-radius: 10px; overflow: hidden;">
                                                    <span class="input-group-text bg-light border-0 text-muted px-3"><i
                                                            class="fas fa-envelope text-success"></i></span>
                                                    <input type="email" name="username"
                                                        class="form-control bg-light border-0 py-2"
                                                        placeholder="Email Address" required>
                                                </div>
                                            </div>

                                            <div class="mb-3">
                                                <div class="input-group shadow-sm"
                                                    style="border-radius: 10px; overflow: hidden;">
                                                    <span class="input-group-text bg-light border-0 text-muted px-3">
                                                        <i class="fas fa-lock text-danger"></i>
                                                    </span>

                                                    <input type="password" name="password" id="password"
                                                        class="form-control bg-light border-0 py-2"
                                                        placeholder="Password" required>

                                                    <span class="input-group-text bg-light border-0 text-muted px-3"
                                                        style="cursor: pointer;" id="togglePassword">
                                                        <i class="bi bi-eye-fill text-info" id="eyeIcon"></i>
                                                    </span>
                                                </div>
                                            </div>

                                            <!-- Remember Me & Forgot Password -->
                                            <div class="d-flex justify-content-between align-items-center mb-4 px-1">
                                                <div class="form-check">
                                                    <input class="form-check-input" type="checkbox" name="rememberMe"
                                                        id="rememberMe">
                                                    <label class="form-check-label small text-muted"
                                                        for="rememberMe">Keep
                                                        me logged in</label>
                                                </div>
                                                <a th:href="@{/public/forgotpassword(clear=true)}"
                                                    class="small text-primary text-decoration-none fw-bold border-bottom border-primary border-1">Forgot?</a>
                                            </div>

                                            <!-- Premium Login Button -->
                                            <button type="submit"
                                                class="btn btn-premium w-100 py-2 rounded-pill shadow fw-bold text-uppercase letter-spacing-1">
                                                Login Account
                                            </button>


                                            <div class="d-flex gap-2 justify-content-between mt-3">
                                                <!-- Google Button (Left Side) -->
                                                <a th:href="@{/oauth2/authorization/google}"
                                                    class="gsi-material-button w-50 justify-content-center py-2 rounded-pill border shadow-sm">
                                                    <div
                                                        class="gsi-material-button-content-wrapper d-flex align-items-center">
                                                        <div class="gsi-material-button-icon me-2" style="width: 18px;">
                                                            <svg version="1.1" xmlns="http://www.w3.org"
                                                                viewBox="0 0 48 48" style="display: block;">
                                                                <path fill="#EA4335"
                                                                    d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z">
                                                                </path>
                                                                <path fill="#4285F4"
                                                                    d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z">
                                                                </path>
                                                                <path fill="#FBBC05"
                                                                    d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z">
                                                                </path>
                                                                <path fill="#34A853"
                                                                    d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z">
                                                                </path>
                                                            </svg>
                                                        </div>
                                                        <span class="fw-bold" style="font-size: 13px;">Google</span>
                                                    </div>
                                                </a>

                                                <!-- GitHub Button (Right Side) -->
                                                <a th:href="@{/oauth2/authorization/github}"
                                                    class="btn btn-dark w-50 d-flex align-items-center justify-content-center rounded-pill shadow-sm py-2">
                                                    <i class="fa-brands fa-github me-2 fs-5"></i>
                                                    <span class="fw-bold text-uppercase"
                                                        style="font-size: 13px;">GitHub</span>
                                                </a>
                                            </div>



                                            <!-- Signup Redirect -->
                                            <div class="text-center mt-4">
                                                <p class="small text-muted mb-0">New to SCM?
                                                    <a th:href="@{/public/signup}"
                                                        class="text-primary fw-bold text-decoration-none border-bottom border-primary border-2 pb-1">Create
                                                        Account</a>
                                                </p>
                                            </div>


                                        </form>

                                        <div th:if="${msgTitle}">
                                            <input type="hidden" id="msg-box" th:value="${msgDash}" />
                                            <input type="hidden" id="type-box" th:value="${msgType}" />
                                            <input type="hidden" id="title-box" th:value="${msgTitle}" />
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>
    </script>
</body>

</html>
