<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{dashboard}">

<head>
    <title th:text="${title}">Dashboard | SCM</title>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>

<body>
    <div layout:fragment="content">

        <div class="relative overflow-x-auto shadow-md sm:rounded-lg border border-gray-200 dark:border-gray-700 mt-6">


            <div th:if="${!orders.isEmpty()}" class="relative overflow-x-auto shadow-md sm:rounded-lg ...">
            </div>

            <div th:unless="${!orders.isEmpty()}"
                class="flex flex-col items-center justify-center p-10 bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-dashed border-gray-300 dark:border-gray-700 mt-6 text-center">

                <div class="mb-4 p-4 bg-yellow-50 dark:bg-yellow-900/20 rounded-full">
                    <i class="fa-solid fa-receipt text-5xl text-yellow-500 animate-pulse"></i>
                </div>

                <h3 class="text-xl font-bold text-gray-800 dark:text-gray-100">No Transactions Yet!</h3>
                <p class="text-gray-500 dark:text-gray-400 mt-2 max-w-sm">
                    No payment record has been found yet. Please manage your contacts and make a small contribution to support the SCM!

                </p>

                <a th:href="@{/user/donate}"
                    class="mt-6 px-6 py-2.5 bg-yellow-500 hover:bg-yellow-600 text-white font-semibold rounded-lg transition duration-300 shadow-md transform hover:scale-105">
                    <i class="fa-solid fa-heart mr-2"></i> Support Us Now
                </a>
            </div>
            <table class="w-full text-sm text-left text-gray-500 dark:text-gray-400">
                <thead class="text-xs text-gray-700 uppercase bg-gray-50 dark:bg-gray-800 dark:text-gray-400">
                    <tr>
                        <th scope="col" class="px-6 py-3">Order Details</th>
                        <th scope="col" class="px-6 py-3">Amount</th>
                        <th scope="col" class="px-6 py-3">Date</th>
                        <th scope="col" class="px-6 py-3 text-center">Status</th>
                        <th scope="col" class="px-6 py-3">Payment Method</th>
                    </tr>
                </thead>

                <tbody>
                    <tr th:each="o : ${orders}"
                        class="bg-white border-b dark:bg-gray-900 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-800 transition duration-300">

                        <td class="px-6 py-4 font-medium text-gray-900 dark:text-white whitespace-nowrap">
                            <div class="flex flex-col">
                                <span class="text-blue-600 dark:text-blue-400 font-bold"
                                    th:text="${o.orderId}">order_123</span>
                                <small class="text-gray-400 text-xs" th:text="${'ID: ' + (o.paymentId ?: 'N/A')}">ID:
                                    pay_abc</small>
                            </div>
                        </td>

                        <td class="px-6 py-4 font-semibold text-gray-700 dark:text-gray-300">
                            ₹<span th:text="${o.amount}">500</span>
                        </td>

                        <td class="px-6 py-4">
                            <span
                                th:text="${#dates.format(new java.util.Date(o.createdAt * 1000), 'dd MMM yyyy, hh:mm a')}">01
                                Jan 2026</span>
                        </td>

                        <td class="px-6 py-4 text-center">
                            <span th:if="${o.status.toString() == 'CREATED'}"
                                class="px-3 py-1 text-xs font-bold text-blue-800 bg-blue-100 rounded-full border border-blue-300 uppercase">
                                Pending
                            </span>

                            <span th:if="${o.status.toString() == 'PAID'}"
                                class="px-3 py-1 text-xs font-bold text-green-800 bg-green-100 rounded-full border border-green-300 uppercase shadow-sm">
                                Paid ✅
                            </span>

                            <span th:if="${o.status.toString() == 'FAILED'}"
                                class="px-3 py-1 text-xs font-bold text-red-800 bg-red-100 rounded-full border border-red-300 uppercase">
                                Failed ❌
                            </span>
                        </td>

                        <td class="px-6 py-4 text-xs italic">
                            <span th:text="${o.paymentMethod ?: '---'}">upi</span>
                            <br>
                            <span class="text-gray-400" th:text="${o.vpa ?: ''}">user@okhdfc</span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
</body>

</html>
