<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{dashboard}">

<head>
    <title th:text="${title}">Dashboard | SCM</title>
</head>

<body>
    <div layout:fragment="content">

        <div th:if="${msg}">
            <input type="hidden" id="msg-box" th:value="${msg}" />
            <input type="hidden" id="type-box" th:value="${type}" />
        </div>

        <section class="flex items-center justify-center min-h-screen p-3 sm:p-4">

            <div class="w-full max-w-3xl bg-gray-800 rounded-[2rem] border border-gray-700 shadow-2xl overflow-hidden">

                <div class="bg-gradient-to-r from-blue-600 to-indigo-700 p-5 flex justify-between items-center">
                    <div class="flex items-center gap-3">
                        <i class="fa-solid fa-paper-plane text-2xl text-white"></i>
                        <h3 class="text-lg font-black text-white uppercase tracking-widest">Compose Blast</h3>
                    </div>
                    <a th:href="@{/user/dashboard_home}"
                        class="text-white/70 hover:text-white bg-white/10 p-2 rounded-full">
                        <i class="fa-solid fa-xmark text-lg"></i>
                    </a>
                </div>

                <form th:action="@{/user/send-email-blast}" method="post" enctype="multipart/form-data"
                    onsubmit="return disableButton()" class="p-6 space-y-4">

                    <div
                        class="bg-gray-900/50 p-3 rounded-2xl border border-blue-500/20 flex items-center justify-between">
                        <span class="text-[10px] font-black text-blue-500 uppercase tracking-widest">Recipients:</span>
                        <span
                            class="bg-blue-500/20 text-blue-400 text-[10px] font-black px-3 py-1 rounded-lg border border-blue-500/30">
                            <span th:text="${totalContacts}">0</span> Contacts Selected
                        </span>
                    </div>

                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-gray-500 uppercase ml-2">Subject</label>
                        <input type="text" name="subject" placeholder="Campaign Subject..." required
                            class="w-full bg-gray-900 border-none rounded-xl p-3 text-sm text-white focus:ring-1 focus:ring-blue-500">
                    </div>

                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-gray-500 uppercase ml-2">Message</label>
                        <textarea name="message" id="mytextarea" class="hidden"></textarea>
                    </div>

                    <div class="relative group">
                        <input type="file" name="attachment" id="attachment" class="hidden"
                            onchange="updateFileName(this)">
                        <label for="attachment"
                            class="flex items-center justify-center w-full p-3 bg-gray-900/30 border-2 border-dashed border-gray-700 rounded-xl cursor-pointer hover:border-blue-500 transition-all">
                            <i class="fa-solid fa-paperclip text-gray-500 mr-2"></i>
                            <span id="file-name-display" class="text-gray-500 text-[10px] font-bold uppercase">Attach
                                File (Max 5MB)</span>
                        </label>
                    </div>

                    <div class="flex gap-3 pt-2">
                        <button id="submitBtn" type="submit"
                            class="flex-[2] bg-blue-600 hover:bg-blue-700 disabled:bg-gray-500 text-white py-3 rounded-xl font-black text-[10px] uppercase tracking-widest shadow-lg flex items-center justify-center gap-3 transition-all duration-300">

                            <span id="btnText">Send Blast Now 🚀</span>

                            <svg id="spinner" class="hidden animate-spin h-5 w-5 text-white"
                                xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor"
                                    stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor"
                                    d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                                </path>
                            </svg>
                        </button>
                    </div>
                </form>
            </div>
        </section>

    </div>
</body>

</html>
