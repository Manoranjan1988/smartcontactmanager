<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz"
    layout:decorate="~{dashboard}">

<head>
    <title th:text="${title}">Profile | SCM</title>
</head>

<body>
    <div layout:fragment="content" class="animate__animated animate__fadeIn">

    <div th:if="${msg}">
        <input type="hidden" id="msg-box" th:value="${msg}" />
        <input type="hidden" id="type-box" th:value="${type}" />
    </div>

    <section class="min-h-screen py-4 md:py-10 bg-gray-50 dark:bg-slate-900">
        <div class="max-w-4xl mx-auto px-4 sm:px-6">
            <form th:action="@{/user/update-profile}" method="post" th:object="${user}" enctype="multipart/form-data">
                <input type="hidden" th:field="*{id}" />

                <div class="bg-white dark:bg-gray-800 rounded-[2rem] md:rounded-[3rem] shadow-2xl overflow-hidden border border-gray-100 dark:border-gray-700">
                    
                    <!-- Header Section -->
                    <div class="p-6 md:p-8 border-b dark:border-gray-700 flex flex-col sm:flex-row justify-between items-center bg-gray-50/50 dark:bg-gray-900/20 gap-4 text-center sm:text-left">
                        <div>
                            <h2 class="text-2xl md:text-3xl font-black dark:text-white">Edit Profile</h2>
                            <p class="text-sm text-gray-500">Update your account information</p>
                        </div>
                        <div class="flex items-center gap-2 px-4 py-2 bg-green-100 dark:bg-green-900/30 rounded-xl">
                            <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                            <span class="text-xs font-bold text-green-700 dark:text-green-400 uppercase tracking-widest" th:text="${user.status}">Active</span>
                        </div>
                    </div>

                    <div class="p-6 md:p-12">
                        <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">

                            <!-- Image Upload Section -->
                            <div class="flex flex-col items-center space-y-4">
                                <div class="relative group">
                                    <img id="image-preview"
                                        th:src="${user.image != null && user.image.startsWith('http') ? user.image : '/image/default_profile.png'}"
                                        class="w-40 h-40 md:w-48 md:h-48 rounded-[2.5rem] md:rounded-[3.5rem] object-cover border-8 border-gray-50 dark:border-gray-900 shadow-xl transition-transform group-hover:scale-105">

                                    <label for="image-input"
                                        class="absolute bottom-2 right-2 bg-blue-600 text-white p-3 md:p-4 rounded-2xl cursor-pointer hover:bg-blue-700 shadow-lg border-4 border-white dark:border-gray-800 transition-all hover:rotate-12">
                                        <i class="fa-solid fa-camera text-sm md:text-base"></i>
                                        <input type="file" id="image-input" name="profileImage" class="hidden" onchange="previewProfileImage(event)">
                                    </label>
                                </div>
                                <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Update Photo</p>
                            </div>

                            <!-- Form Fields Section -->
                            <div class="lg:col-span-2 space-y-6">

                                <!-- Email (Readonly) -->
                                <div class="space-y-2">
                                    <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">Email (Cannot be changed)</label>
                                    <div class="relative">
                                        <i class="fa-solid fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                                        <input type="email" th:field="*{email}" readonly
                                            class="w-full pl-12 pr-4 py-4 bg-gray-100 dark:bg-gray-900/80 border-2 border-transparent rounded-2xl text-gray-500 cursor-not-allowed outline-none font-bold text-sm">
                                    </div>
                                </div>

                                <!-- Name Field -->
                                <div class="space-y-2">
                                    <label class="text-[10px] font-black text-blue-600 dark:text-blue-400 uppercase tracking-widest ml-1">Full Name</label>
                                    <div class="relative">
                                        <i class="fa-solid fa-user absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                                        <input type="text" th:field="*{name}"
                                            class="w-full pl-12 pr-4 py-4 bg-gray-50 dark:bg-gray-900/50 border-2 border-transparent focus:border-blue-500 dark:focus:border-blue-400 rounded-2xl outline-none dark:text-white font-bold transition-all placeholder:text-gray-300">
                                    </div>
                                </div>

                                <!-- About Bio -->
                                <div class="space-y-2">
                                    <label class="text-[10px] font-black text-purple-600 dark:text-purple-400 uppercase tracking-widest ml-1">About Bio</label>
                                    <textarea th:field="*{about}" rows="4"
                                        class="w-full p-4 bg-gray-50 dark:bg-gray-900/50 border-2 border-transparent focus:border-purple-500 dark:focus:border-purple-400 rounded-2xl outline-none dark:text-white font-medium resize-none transition-all"></textarea>
                                </div>

                                <!-- Action Buttons -->
                                <div class="flex flex-col sm:flex-row items-center justify-end gap-3 pt-6">
                                    <!-- New Premium Cancel Button -->
                                    <a th:href="@{/user/profile}"
                                        class="w-full sm:w-auto px-8 py-4 text-sm font-bold text-gray-500 dark:text-gray-400 bg-gray-100 dark:bg-gray-900/50 hover:bg-gray-200 dark:hover:bg-gray-700 rounded-2xl transition-all text-center order-2 sm:order-1 active:scale-95">
                                        Cancel
                                    </a>
                                    
                                    <!-- Save Button -->
                                    <button id="profileBtn" type="submit"
                                        class="w-full sm:w-auto px-10 py-4 bg-blue-600 text-white rounded-2xl font-bold shadow-lg shadow-blue-500/30 hover:bg-blue-700 hover:-translate-y-1 transition-all active:scale-95 disabled:opacity-70 disabled:cursor-not-allowed order-1 sm:order-2">
                                        <i id="profileSpinner" class="fa-solid fa-circle-notch fa-spin mr-2 text-white hidden"></i>
                                        <span id="profileBtnText">Save Changes</span>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </section>
</div>

</body>

</html>
