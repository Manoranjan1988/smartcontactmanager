<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" 
      xmlns:layout="http://www.ultraq.net.nz"
      layout:decorate="~{dashboard}">

<head>
    <title th:text="${title}">Reset Password | SCM</title>
</head>

<body>
    <div layout:fragment="content" class="animate__animated animate__fadeIn">

        <div th:if="${msg}">
            <input type="hidden" id="msg-box" th:value="${msg}" />
            <input type="hidden" id="type-box" th:value="${type}" />
        </div>
    <div class="flex items-center justify-center h-[calc(100vh-100px)] px-4">
        
        <div class="w-full max-w-4xl bg-white dark:bg-gray-800 rounded-[2rem] shadow-2xl border border-gray-100 dark:border-gray-700 flex flex-col overflow-hidden">
            
            <div class="flex items-center justify-between px-8 py-5 bg-gradient-to-r from-gray-50 to-gray-100 dark:from-gray-900/40 dark:to-gray-800 border-b dark:border-gray-700">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white text-lg shadow-lg">
                        <i class="fa-solid fa-shield-halved"></i>
                    </div>
                    <div>
                        <h2 class="text-xl font-black dark:text-white leading-none">Security Center</h2>
                        <p class="text-[9px] text-gray-500 uppercase tracking-widest mt-1">Update your password</p>
                    </div>
                </div>
                <div th:if="${otpSent}" class="px-3 py-1.5 bg-yellow-100 dark:bg-yellow-900/20 text-yellow-700 dark:text-yellow-400 rounded-lg text-[10px] font-bold border border-yellow-200 dark:border-yellow-800">
                    <i class="fas fa-clock mr-1"></i> <span id="timer">00:40</span>
                </div>
            </div>

            <div class="p-8">
                <form th:action="${otpSent} ? @{/user/do-password-reset} : @{/user/send-otp-reset}" method="post" class="space-y-6">
                    
                    <div class="bg-gray-50 dark:bg-gray-900/40 p-4 rounded-2xl flex items-center gap-4 border border-transparent dark:border-gray-700">
                        <div class="w-10 h-10 rounded-full bg-blue-100 dark:bg-blue-900/30 flex items-center justify-center text-blue-600">
                            <i class="fas fa-envelope text-sm"></i>
                        </div>
                        <div class="flex-1">
                            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Registered Email</p>
                            <input type="email" name="email" th:value="${user.email}" readonly
                                   class="w-full bg-transparent border-none outline-none dark:text-gray-300 font-semibold text-sm cursor-not-allowed">
                        </div>
                    </div>

                    <div th:if="${otpSent}" class="grid grid-cols-1 md:grid-cols-2 gap-6 animate__animated animate__fadeIn">
                        
                        <div class="space-y-4">
                            <div class="space-y-1">
                                <label class="text-[10px] font-bold text-blue-500 ml-1 uppercase">New Password</label>
                                <div class="relative">
                                    <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                                    <input type="password" name="password" required
                                           class="w-full pl-11 pr-4 py-3 bg-gray-50 dark:bg-gray-900/60 border-2 border-transparent focus:border-blue-500 rounded-xl outline-none dark:text-white text-sm transition-all"
                                           placeholder="8+ characters">
                                </div>
                            </div>
                            <div class="space-y-1">
                                <label class="text-[10px] font-bold text-blue-500 ml-1 uppercase">Confirm Password</label>
                                <div class="relative">
                                    <i class="fas fa-check-double absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                                    <input type="password" name="cnfpassword" required
                                           class="w-full pl-11 pr-4 py-3 bg-gray-50 dark:bg-gray-900/60 border-2 border-transparent focus:border-blue-500 rounded-xl outline-none dark:text-white text-sm transition-all"
                                           placeholder="Re-type password">
                                </div>
                            </div>
                        </div>

                        <div class="space-y-4 flex flex-col justify-between">
                            <div class="space-y-1">
                                <label class="text-[10px] font-bold text-red-500 ml-1 uppercase">Verification Code (OTP)</label>
                                <div class="relative">
                                    <i class="fa-solid fa-key absolute left-4 top-1/2 -translate-y-1/2 text-red-400"></i>
                                    <input type="text" name="otp" pattern="[0-9]{6}" maxlength="6" inputmode="numeric" required
                                           class="w-full pl-11 pr-4 py-3 bg-gray-50 dark:bg-gray-900/60 border-2 border-transparent focus:border-red-500 rounded-xl outline-none dark:text-white font-black tracking-[0.5em] text-center text-lg"
                                           placeholder="000000">
                                </div>
                            </div>

                            <button type="submit" id="submit-btn"
                                    class="w-full py-3.5 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-bold shadow-lg shadow-blue-500/30 transition-all active:scale-95 uppercase tracking-widest text-xs">
                                Update Password
                            </button>
                        </div>
                    </div>

                    <button th:unless="${otpSent}" type="submit" 
                            class="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white rounded-2xl font-bold shadow-xl shadow-blue-500/40 transition-all active:scale-95 uppercase tracking-widest text-sm">
                        Send OTP Code
                    </button>
                </form>

                <div th:if="${otpSent}" id="resend-container" style="display: none;" class="mt-4 text-center border-t dark:border-gray-700 pt-4">
                    <form th:action="@{/user/send-otp-reset}" method="post" class="flex items-center justify-center gap-2">
                        <input type="hidden" name="email" th:value="${email}">
                        <span class="text-[10px] text-gray-500 italic">Didn't get the code?</span>
                        <button type="submit" class="text-[10px] font-black text-blue-500 hover:underline uppercase tracking-tighter">
                            Resend Now
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</div>
</body>
</html>
