<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" 
                xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
                layout:decorate="~{dashboard}">

<head>
    <title th:text="${title}">Add Contact | SCM</title>
</head>

<body>
    <div layout:fragment="content" class="animate__animated animate__fadeIn">
        
        <div class="max-w-4xl mx-auto">
            <!-- Card Container -->
            <div class="bg-white dark:bg-gray-800 rounded-3xl shadow-xl border border-gray-100 dark:border-gray-700 overflow-hidden">
                
                <!-- Card Header (Dynamic for Add/Update) -->
                <div th:classappend="${isUpdate} ? 'from-green-600 to-teal-700' : 'from-blue-600 to-indigo-700'" 
                    class="bg-gradient-to-r px-8 py-6 text-white text-center transition-all duration-500">
                    
                    <!-- Dynamic Title -->
                    <h1 class="text-2xl md:text-3xl font-bold" 
                        th:text="${isUpdate} ? 'Update Contact Details' : 'Add New Contact'">
                        Add New Contact
                    </h1>
                    
                    <!-- Dynamic Sub-title -->
                    <p class="text-blue-100 text-sm mt-1 opacity-90" 
                    th:text="${isUpdate} ? 'Modify your contact information accurately.' : 'Store your professional & personal contacts securely.'">
                        Store your professional & personal contacts securely.
                    </p>
                </div>

                <div class="p-6 md:p-10">
                    <form th:action="${isUpdate}? @{/user/processUpdate} : @{/user/processContact}" 
                          method="post" 
                          th:object="${contact}" 
                          enctype="multipart/form-data" 
                          class="space-y-6">

                        <input th:if="${isUpdate}" type="hidden" name="cid" th:value="${contact.cid}" />

                        <!-- First Name Field -->
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="space-y-2">
                                <label class="text-sm font-bold text-gray-700 dark:text-gray-300 ml-1">First Name</label>
                                <div class="relative">
                                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                        <i class="fa-solid fa-user-plus text-blue-500"></i>
                                    </div>
                                    <input required type="text" th:field="*{firstName}"
                                           class="block w-full pl-10 pr-3 py-3 bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent transition dark:text-white" 
                                           placeholder="Enter FirstName Here">
                                </div>
                            </div>

                            <!-- LastName Field (Added for pro look) -->
                            <div class="space-y-2">
                                <label class="text-sm font-bold text-gray-700 dark:text-gray-300 ml-1">Nickname</label>
                                <div class="relative">
                                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                        <i class="fa-solid fa-id-badge text-blue-500"></i>
                                    </div>
                                    <input required type="text" th:field="*{lastName}"
                                           class="block w-full pl-10 pr-3 py-3 bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent transition dark:text-white" 
                                           placeholder="Enter Last Name Here">
                                </div>
                            </div>
                        </div>

                        <!-- Phone & Email Row -->
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="space-y-2">
                                <label class="text-sm font-bold text-gray-700 dark:text-gray-300 ml-1">Phone Number</label>
                                <div class="relative">
                                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                        <i class="fa-solid fa-phone text-blue-500"></i>
                                    </div>
                                    <input required type="tel" th:field="*{phone}"
                                           inputmode="numeric" 
                                           class="block w-full pl-10 pr-3 py-3 bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent transition dark:text-white" 
                                           placeholder="9437XXXXXX" minlength="10" maxlength="10"
                                           pattern="[0-9]{10}" title="Please enter exactly 10 digits">
                                </div>
                            </div>

                            <div class="space-y-2">
                                <label class="text-sm font-bold text-gray-700 dark:text-gray-300 ml-1">Email Address</label>
                                <div class="relative">
                                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                        <i class="fa-solid fa-envelope text-blue-500"></i>
                                    </div>
                                    <input required type="email" th:field="*{email}"
                                           class="block w-full pl-10 pr-3 py-3 bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent transition dark:text-white" 
                                           placeholder="example@mail.com">
                                </div>
                            </div>
                        </div>

                        <!-- Work/Profession -->
                        <div class="space-y-2">
                            <label class="text-sm font-bold text-gray-700 dark:text-gray-300 ml-1">Work / Profession</label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                    <i class="fa-solid fa-briefcase text-blue-500"></i>
                                </div>
                                <input type="text" th:field="*{work}"
                                       class="block w-full pl-10 pr-3 py-3 bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent transition dark:text-white" 
                                       placeholder="Ex: Software Engineer">
                            </div>
                        </div>

                        <!-- Contact Image Upload -->
                        <div class="space-y-2">
                            <label class="text-sm font-bold text-gray-700 dark:text-gray-300 ml-1">Contact Image</label>
                            <input type="file" id="maxFile" name="contactimage" accept="image/*"
                                   class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-bold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 transition cursor-pointer">
                        </div>

                        <!-- Contact Description -->
                        <div class="space-y-2">
                            <label class="text-sm font-bold text-gray-700 dark:text-gray-300 ml-1">About Contact</label>
                            <textarea th:field="*{description}" rows="4" id="mytextarea"
                                      class="block w-full p-4 bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent transition dark:text-white" 
                                      placeholder="Brief details about this person..."></textarea>
                        </div>

                        

                        <!-- Submit Button -->
                        <div class="pt-4">
                            <button type="submit" id="submitBtn"
                                    th:text="${isUpdate}? 'Update Contact' : 'Save Contact'"
                                    class="w-full bg-gradient-to-r from-blue-600 to-indigo-700 text-white font-bold py-4 rounded-2xl shadow-lg hover:shadow-blue-500/30 transform hover:-translate-y-1 transition duration-300 uppercase tracking-wider">
                                <i class="fa-solid fa-cloud-arrow-up mr-2"></i> Save Contact
                            </button>
                        </div>

                    </form>
                    <div th:if="${msg}">
                    <input type="hidden" id="msg-box" th:value="${msg}" />
                    <input type="hidden" id="type-box" th:value="${type}" />
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
