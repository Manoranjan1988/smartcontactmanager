<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz"
    xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">SCM - Dashboard</title>
    <meta name="referrer" content="no-referrer">
    <link rel="stylesheet" th:href="@{/css/dashstyle.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@sweetalert2/theme-dark@4/dark.css">
    <script>
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>


</head>

<body class="bg-gray-50 dark:bg-gray-900 transition-colors duration-300 overflow-x-hidden">

    <!-- 1. RESPONSIVE NAVBAR -->
    <nav
        class="bg-white dark:bg-gray-800 shadow-md sticky top-0 z-50 border-b dark:border-gray-700 h-20 flex items-center">
        <div class="w-full mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center">

                <!-- LEFT SIDE: Hamburger + Brand + Mobile Username -->
                <div class="flex items-center gap-3">
                    <!-- Hamburger Menu (Mobile Only) -->
                    <button onclick="toggleSidebar()"
                        class="md:hidden flex items-center justify-center p-2 rounded-xl bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-yellow-400 border border-gray-200 dark:border-gray-600 shadow-sm transition active:scale-95"
                        id="hamburger-btn">
                        <i class="fa-solid fa-bars text-xl"></i>
                    </button>

                    <!-- Brand (Logo hidden on very small screens for space) -->
                    <div class="hidden sm:flex items-center gap-2">
                        <i class="fa-solid fa-address-book text-blue-600 text-2xl"></i>
                        <span class="text-xl font-bold text-gray-800 dark:text-white">SCM</span>
                    </div>

                    <!-- Username: Ab ye Left side mein chamkega mobile pe bhi -->
                    <div class="flex flex-col ml-1">
                        <span
                            class="text-[10px] uppercase tracking-wider text-gray-500 dark:text-gray-400 font-bold leading-none">Welcome</span>
                        <span
                            class="text-sm font-extrabold text-gray-800 dark:text-white truncate max-w-[180px] sm:max-w-none"
                            th:text="${user.name}">
                    </div>
                </div>

                <!-- RIGHT SIDE ACTIONS -->
                <div class="flex items-center space-x-2 md:space-x-4">

                    <!-- Dark Mode Toggle -->
                    <button onclick="toggleDarkMode()"
                        class="flex items-center justify-center p-2 rounded-xl border border-gray-200 dark:border-gray-600 bg-gray-50 dark:bg-gray-700 transition-all shadow-sm hover:scale-105 active:scale-95"
                        title="Toggle Theme" style="min-width: 45px; height: 36px;">
                        <i class="bi bi-toggle-off text-2xl text-gray-600 dark:hidden"></i>
                        <i class="bi bi-toggle-on text-2xl hidden dark:block text-yellow-400"></i>
                    </button>

                    <!-- Profile Pic & Logout -->
                    <div class="flex items-center gap-2 md:gap-4">
                        <img th:src="${user.image != null && user.image.startsWith('http') ? user.image : '/image/default_profile.png'}"
                            class="w-9 h-9 rounded-full object-cover border-2 border-blue-500 shadow-sm" alt="Profile">


                        <form th:action="@{/user/do-logout}" method="post">
                            <button type="submit"
                                class="bg-red-500 hover:bg-red-600 text-white p-2 md:px-4 md:py-2 rounded-xl text-xs md:text-sm font-bold transition shadow-md flex items-center">

                                <i class="fa-solid fa-power-off"></i>
                                <span class="hidden md:inline ml-2">Logout</span>
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- 2. MAIN LAYOUT (Sidebar + Content) -->
    <div class="flex min-h-screen relative">

        <!-- SIDEBAR: Mobile pe Drawer ban jayega -->
        <aside id="sidebar"
            class="fixed inset-y-0 left-0 transform -translate-x-full md:relative md:translate-x-0 transition duration-300 ease-in-out z-40 w-64 bg-white dark:bg-gray-800 border-r dark:border-gray-700 p-5 space-y-2 pt-20 md:pt-5">
            <a th:href="@{/user/dashboard_home}"
                class="flex items-center p-3 bg-blue-600 text-white rounded-xl shadow-lg transition transform hover:scale-105">
                <i class="fa-solid fa-house w-6"></i> Home
            </a>
            <a th:href="@{/user/add-contact}"
                class="flex items-center p-3 text-gray-600 dark:text-gray-300 hover:bg-blue-50 dark:hover:bg-gray-700 rounded-xl transition group">
                <i class="fa-solid fa-plus w-6 group-hover:text-blue-500"></i> Add Contact
            </a>
            <a th:href="@{/user/show-contacts(currentPage=0)}"
                class="flex items-center p-3 text-gray-600 dark:text-gray-300 hover:bg-blue-50 dark:hover:bg-gray-700 rounded-xl transition group">
                <i class="fa-solid fa-address-card w-6 group-hover:text-blue-500"></i> View Contacts
            </a>
            <a th:href="@{/user/profile}"
                class="flex items-center p-3 text-gray-600 dark:text-gray-300 hover:bg-blue-50 dark:hover:bg-gray-700 rounded-xl transition group">
                <i class="fa-solid fa-user-circle w-6 group-hover:text-blue-500"></i> Profile
            </a>

            <div class="pt-4 mt-4 border-t border-gray-100 dark:border-gray-700" x-data="{ open: false }">
                <p class="px-4 mb-2 text-[10px] font-bold text-gray-400 uppercase tracking-[0.2em]">Configuration</p>

                <button @click="open = !open"
                    class="w-full flex items-center justify-between p-3 text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700/50 rounded-xl transition group">
                    <div class="flex items-center">
                        <i class="fa-solid fa-gear w-6 transition-colors text-yellow-500 group-hover:text-blue-500"></i>
                        <span class="font-medium">Account Settings</span>
                    </div>
                    <i class="fa-solid fa-chevron-down text-[10px] transition-transform duration-300"
                        :class="open ? 'rotate-180' : ''"></i>
                </button>

                <div x-show="open" x-cloak x-transition:enter="transition ease-out duration-200"
                    x-transition:enter-start="opacity-0 transform -translate-y-2"
                    x-transition:enter-end="opacity-100 transform translate-y-0"
                    class="mt-1 ml-4 border-l-2 border-gray-100 dark:border-gray-700 space-y-1">

                    <a th:href="@{/user/profile_settings}"
                        class="flex items-center p-2.5 pl-6 text-sm text-gray-500 dark:text-gray-400 hover:text-blue-600 dark:hover:text-blue-400 rounded-r-xl transition hover:bg-blue-50/50 dark:hover:bg-blue-900/10">
                        <i class="fa-solid fa-user-pen w-5 text-green-500 text-[12px]"></i>
                        Edit Profile
                    </a>

                    <a th:href="@{/user/reset_password(clear=true)}"
                        class="flex items-center p-2.5 pl-6 text-sm text-gray-500 dark:text-gray-400 hover:text-red-600 dark:hover:text-red-400 rounded-r-xl transition hover:bg-red-50/50 dark:hover:bg-red-900/10">
                        <i class="fa-solid fa-shield-halved w-5 text-blue-500 text-[12px]"></i>
                        Security & Password
                    </a>
                </div>
            </div>

             <!-- payment Area -->
            <div class="pt-4 mt-4 border-t border-gray-100 dark:border-gray-700" x-data="{ open: false }">
                <p class="px-4 mb-2 text-[10px] font-bold text-gray-400 uppercase tracking-[0.2em]">Configuration</p>

                <button @click="open = !open"
                    class="w-full flex items-center justify-between p-3 text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700/50 rounded-xl transition group">
                    <div class="flex items-center">
                        <i class="fa-solid fa-file-invoice-dollar w-6 text-yellow-500 group-hover:scale-110 transition duration-300"></i>
                        <span class="font-medium">Payment & Support</span>
                    </div>
                    <i class="fa-solid fa-chevron-down text-[10px] transition-transform duration-300"
                        :class="open ? 'rotate-180' : ''"></i>
                </button>

                <div x-show="open" x-cloak x-transition:enter="transition ease-out duration-200"
                    x-transition:enter-start="opacity-0 transform -translate-y-2"
                    x-transition:enter-end="opacity-100 transform translate-y-0"
                    class="mt-1 ml-4 border-l-2 border-gray-100 dark:border-gray-700 space-y-1">

                    <a th:href="@{/user/donate}"
                        class="flex items-center p-2.5 pl-6 text-sm text-gray-500 dark:text-gray-400 hover:text-blue-600 dark:hover:text-blue-400 rounded-r-xl transition hover:bg-blue-50/50 dark:hover:bg-blue-900/10">
                        <i class="fa-solid fa-heart mr-2 text-xs text-red-500"></i>
                        Support Us / Donate
                    </a>

                    <a th:href="@{/user/order_history}"
                        class="flex items-center p-2.5 pl-6 text-sm text-gray-500 dark:text-gray-400 hover:text-red-600 dark:hover:text-red-400 rounded-r-xl transition hover:bg-red-50/50 dark:hover:bg-red-900/10">
                        <i class="fa-solid fa-history mr-2 text-xs text-yellow-500"></i>
                        Order History
                    </a>
                </div>
            </div>

            

            <!-- Admin Section (Only for ROLE_ADMIN) -->
            <div sec:authorize="hasRole('ADMIN')" class="mt-6 border-t border-gray-700 pt-4">
                <p class="text-[10px] text-gray-500 font-bold uppercase tracking-[0.2em] mb-4 ml-4">ADMIN PANEL</p>

                <a th:href="@{/admin/manage_users}"
                    class="flex items-center p-4 hover:bg-red-600/10 text-red-500 rounded-2xl transition group">
                    <i class="fa-solid fa-users-gear text-xl mr-3 group-hover:scale-110 transition"></i>
                    <span class="font-bold">Manage All Users</span>
                </a>

            </div>

        </aside>

        <!-- CONTENT AREA -->
        <main class="flex-1 p-4 md:p-8 overflow-y-auto page-transition">
            <!-- Yahan content inject hoga -->
            <div layout:fragment="content">

            </div>
        </main>
    </div>

    <!-- Overlay for Mobile Sidebar -->
    <div onclick="toggleSidebar()" class="fixed inset-0 bg-black opacity-50 z-30 hidden md:hidden" id="overlay">

    </div>

    <!-- GLOBAL MODAL -->
    <!-- VIEW CONTACT MODAL (Hidden by Default) -->
    <div id="contactModal" class="custom-modal-overlay p-4">

        <!-- max-w-sm (Small) karne se width ekdum perfect ho jayegi -->
        <div
            class="bg-white dark:bg-gray-800 w-full max-w-sm rounded-[2.5rem] shadow-2xl overflow-hidden relative animate__animated animate__zoomIn animate__faster">

            <!-- Modal Header (Height thodi kam: h-32) -->
            <div class="h-32 bg-gradient-to-r from-blue-600 to-indigo-700 flex items-center justify-center relative">
                <button onclick="closeModal()"
                    class="absolute top-4 right-4 text-white/50 hover:text-white transition text-xl">
                    <i class="fa-solid fa-circle-xmark"></i>
                </button>
                <!-- Image size thodi kam: w-24 h-24 -->
                <img id="m-img" src=""
                    class="w-24 h-24 rounded-2xl object-cover border-4 border-white dark:border-gray-800 shadow-xl absolute -bottom-12">
            </div>

            <!-- Modal Body (Padding thodi kam) -->
            <div class="pt-16 pb-8 px-6 text-center">
                <h2 id="m-name" class="text-2xl font-black text-gray-800 dark:text-white leading-tight">Name</h2>
                <p id="m-work" class="text-blue-600 font-bold text-[10px] uppercase tracking-[0.2em] mt-1">Work</p>

                <!-- Details Box (Padding p-4) -->
                <div
                    class="mt-6 space-y-3 text-left bg-gray-50 dark:bg-gray-700/50 p-4 rounded-3xl border border-gray-100 dark:border-gray-600">
                    <div class="flex items-center gap-3">
                        <div
                            class="w-8 h-8 bg-blue-100 dark:bg-blue-900/40 rounded-lg flex items-center justify-center text-blue-600 text-sm">
                            <i class="fa-solid fa-envelope"></i>
                        </div>
                        <div>
                            <p class="text-[9px] text-gray-400 font-bold uppercase tracking-wider">Email</p>
                            <p id="m-email" class="text-xs font-semibold dark:text-white truncate">email@test.com</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-3">
                        <div
                            class="w-8 h-8 bg-green-100 dark:bg-green-900/40 rounded-lg flex items-center justify-center text-green-600 text-sm">
                            <i class="fa-solid fa-phone"></i>
                        </div>
                        <div>
                            <p class="text-[9px] text-gray-400 font-bold uppercase tracking-wider">Phone</p>
                            <p id="m-phone" class="text-xs font-semibold dark:text-white tracking-widest">+91 0000000000
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.tiny.cloud/1/119a5c67m0hctk2381i0fc468nwcn7ehugt1pjnrjbaw6ig9/tinymce/8/tinymce.min.js"
        referrerpolicy="origin" crossorigin="anonymous"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.23.0/sweetalert2.min.js">

    </script>

    <script th:src="@{/js/dashboard.js}"></script>
    <script th:src="@{/js/donation.js}"></script>

</body>

</html>
